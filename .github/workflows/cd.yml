name: CD - Deploy to Azure
'on':
  workflow_run:
    workflows:
    - CI - Build and Test
    types:
    - completed
    branches:
    - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@v4
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Verify and flatten artifacts
      run: ls -la ./artifacts/ && if [ -d './artifacts/build-output' ]; then echo
        'Flattening build-output directory' && mv ./artifacts/build-output/* ./artifacts/
        && rmdir ./artifacts/build-output; fi && ls -la ./artifacts/ && echo 'Artifacts
        ready for deployment'
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: my-app07nv4-riguw7x4
        resource-group-name: my-app07nv4-rg
        package: ./artifacts/
    - name: Debug artifacts structure
      run: |
        echo "Listing artifacts"
        ls -la ./artifacts
        echo "Recursive listing"
        ls -R ./artifacts
    - name: Validate deployment
      run: "\n# Wait for deployment to be ready\nsleep 30\n\n# Get the Azure Web App\
        \ URL directly (Terraform state not available in CD environment)\nAPP_URL=\"\
        https://my-app07nv4-riguw7x4.azurewebsites.net\"\n\necho \"Testing deployment\
        \ at $APP_URL\"\n\n# Check if app responds\nHTTP_STATUS=$(curl -s -o /dev/null\
        \ -w \"%{http_code}\" $APP_URL)\nif [ $HTTP_STATUS -eq 200 ]; then\n  echo\
        \ \"\u2705 Deployment successful - App is responding\"\n  echo \"\U0001F310\
        \ Application URL: $APP_URL\"\nelif [ $HTTP_STATUS -eq 404 ]; then\n  echo\
        \ \"\u26A0\uFE0F App deployed but not ready yet (404) - this is normal for\
        \ new deployments\"\n  echo \"\U0001F310 Application URL: $APP_URL\"\n  echo\
        \ \"\U0001F4A1 The app may take a few more minutes to start up\"\nelse\n \
        \ echo \"\u274C Deployment validation failed - HTTP Status: $HTTP_STATUS\"\
        \n  echo \"\U0001F310 Application URL: $APP_URL\"\n  echo \"\U0001F4A1 Check\
        \ the Azure portal for deployment logs\"\n  exit 1\nfi\n"
