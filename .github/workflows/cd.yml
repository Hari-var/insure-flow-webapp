name: CD - Deploy to Azure

on:
  workflow_run:
    workflows:
      - CI - Build and Test
    types:
      - completed
    branches:
      - master

permissions:
  contents: read
  actions: read

env:
  AZURE_WEBAPP_NAME: my-app13389884
  RESOURCE_GROUP: health_check

jobs:
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔍 Debug Workflow Info
      run: |
        echo "Workflow Run ID: ${{ github.event.workflow_run.id }}"
        echo "Workflow Name: ${{ github.event.workflow_run.name }}"

    - name: 📦 Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GH_TOKEN }}

    - name: 📂 Verify Artifacts
      run: |
        echo "Listing artifacts directory"
        ls -la ./artifacts
        ls -la ./artifacts/dist || true

    - name: 🔐 Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        resource-group: ${{ env.RESOURCE_GROUP }}
        package: ./artifacts/dist

    - name: ⏳ Wait for Deployment
      run: sleep 30

    - name: ✅ Validate Deployment
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        
        echo "Testing deployment at $APP_URL"
        
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $APP_URL)
        
        if [ $HTTP_STATUS -eq 200 ]; then
          echo "✅ Deployment successful"
          echo "🌐 Application URL: $APP_URL"
        else
          echo "❌ Deployment validation failed - HTTP Status: $HTTP_STATUS"
          exit 1
        fi

    - name: 📢 Deployment Summary
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        
        echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- 🌐 App URL: $APP_URL" >> $GITHUB_STEP_SUMMARY
        echo "- 🔧 Environment: dev" >> $GITHUB_STEP_SUMMARY
        echo "🎉 CD_SUCCESS: $APP_URL"
