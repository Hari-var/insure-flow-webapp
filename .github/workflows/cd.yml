name: CD - Deploy to Azure
'on':
  workflow_run:
    workflows:
    - CI - Build and Test
    types:
    - completed
    branches:
    - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@v4
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: my-app136984
        resource-group: health_check
        package: ./artifacts/dist
    - name: Validate deployment
      run: "\n# Wait for deployment to be ready\nsleep 30\n\n# Test the deployed application\n\
        APP_URL=\"https://my-app136984.azurewebsites.net\"\necho \"Testing deployment\
        \ at $APP_URL\"\n\n# Check if app responds\nHTTP_STATUS=$(curl -s -o /dev/null\
        \ -w \"%{http_code}\" $APP_URL)\nif [ $HTTP_STATUS -eq 200 ]; then\n  echo\
        \ \"\u2705 Deployment successful - App is responding\"\n  echo \"\U0001F310\
        \ Application URL: $APP_URL\"\nelse\n  echo \"\u274C Deployment validation\
        \ failed - HTTP Status: $HTTP_STATUS\"\n  exit 1\nfi\n"
