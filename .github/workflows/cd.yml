name: CD - Deploy to Azure
'on':
  workflow_run:
    workflows:
    - CI - Build and Test
    types:
    - completed
    branches:
    - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@v4
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GH_TOKEN }}
    - name: Verify artifacts
      run: ls -la ./artifacts/ && echo 'Artifacts downloaded successfully'
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: my-app178488mnv4
        resource-group: health_check
        package: ./artifacts/
    - name: Validate deployment
      run: "\n# Wait for deployment to be ready\nsleep 30\n\n# Get app URL from Terraform\
        \ outputs\nAPP_URL=$(terraform output -raw app_url 2>/dev/null || echo \"\"\
        )\nif [ -z \"$APP_URL\" ]; then\n  echo \"\u274C Failed to get app URL from\
        \ Terraform outputs\"\n  exit 1\nfi\n\necho \"Testing deployment at $APP_URL\"\
        \n\n# Check if app responds\nHTTP_STATUS=$(curl -s -o /dev/null -w \"%{http_code}\"\
        \ $APP_URL)\nif [ $HTTP_STATUS -eq 200 ]; then\n  echo \"\u2705 Deployment\
        \ successful - App is responding\"\n  echo \"\U0001F310 Application URL: $APP_URL\"\
        \nelse\n  echo \"\u274C Deployment validation failed - HTTP Status: $HTTP_STATUS\"\
        \n  exit 1\nfi\n"
